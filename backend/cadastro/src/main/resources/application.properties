spring.application.name=cadastro


spring.profiles.active=${APP_PROFILE:test}
spring.jpa.open-in-view=false

app.jwt.expiration-seconds=900

app.jwt.private-key=classpath:keys/private.pem
app.jwt.public-key=classpath:keys/public.pem

pluggy.base-url=https://localhost:9999
pluggy.client-id=10484b18-ca75-43f7-b4d5-ec8bcc387be2
pluggy.client-secret=df1249fa-23fc-48da-bf37-5ac834cccd91
pluggy.oauth-redirect-url=http://localhost:4200/pluggy/callback
pluggy.include-sandbox=true

resilience4j.retry.instances.pluggy.max-attempts=3
resilience4j.retry.instances.pluggy.wait-duration=700ms
resilience4j.retry.instances.pluggy.enable-exponential-backoff=true
resilience4j.retry.instances.pluggy.exponential-backoff-multiplier=2

resilience4j.circuitbreaker.instances.pluggy.sliding-window-size=10
resilience4j.circuitbreaker.instances.pluggy.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.pluggy.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.pluggy.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.pluggy.permitted-number-of-calls-in-half-open-state=3


